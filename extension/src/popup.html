<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #1c1c1e;
      color: #f5f5f7;
      font-size: 13px;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header img {
      width: 32px;
      height: 32px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
    }
    .header span {
      font-size: 11px;
      color: #6b7280;
      margin-left: auto;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .toggle-label {
      font-weight: 500;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #3a3a3c;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #34d399;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }

    .field {
      padding: 12px 0 8px;
    }
    .field label {
      display: block;
      font-size: 11px;
      color: #6b7280;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }
    .field input[type="number"] {
      width: 60px;
      padding: 4px 8px;
      background: #2c2c2e;
      border: 1px solid #3a3a3c;
      border-radius: 6px;
      color: #f5f5f7;
      font-size: 13px;
      font-family: inherit;
    }
    .field input[type="number"]:focus {
      outline: none;
      border-color: #34d399;
    }
    .field textarea {
      width: 100%;
      padding: 6px 8px;
      background: #2c2c2e;
      border: 1px solid #3a3a3c;
      border-radius: 6px;
      color: #f5f5f7;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 56px;
      line-height: 1.5;
    }
    .field textarea:focus {
      outline: none;
      border-color: #34d399;
    }
    .field .hint {
      font-size: 10px;
      color: #6b7280;
      margin-top: 4px;
    }

    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: #6b7280;
      text-align: center;
    }
    .footer a {
      color: #34d399;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon-48.png" alt="PR Zen">
    <h1>PR Zen</h1>
    <span>v1.0.0</span>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Enabled</span>
    <label class="toggle">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="field">
    <label for="minBotComments">Min bot comments to show</label>
    <input type="number" id="minBotComments" min="1" max="50" value="3">
  </div>

  <div class="field">
    <label for="botPatterns">Bot patterns</label>
    <textarea id="botPatterns" rows="3"></textarea>
    <div class="hint">One pattern per line, matched against username</div>
  </div>

  <div class="field">
    <label for="alertKeywords">Alert keywords</label>
    <textarea id="alertKeywords" rows="3"></textarea>
    <div class="hint">One keyword per line, matched in comment body</div>
  </div>

  <div class="footer">
    <a href="https://github.com/Cocola/pr-zen" target="_blank">GitHub</a> · MIT License
  </div>

  <script src="popup.js"></script>
</body>
</html>
